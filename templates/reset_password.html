{% extends 'base.html' %}
{% block title %}Новый пароль — ORDENTIST CLINIC{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <a href="/" class="auth-brand">
        <img src="/images/logo/logo.png" alt="">
        <span>ORDENTIST CLINIC</span>
    </a>
    <div class="auth-card">
        <h1>Новый пароль</h1>
        <p class="auth-sub">Придумайте надёжный пароль — минимум 6 символов.</p>

        {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}

        <form method="post" action="/reset-password/{{ token }}" class="auth-form"
              id="reset-form" novalidate>
            <label>
                <span>Новый пароль</span>
                <div class="input-with-icon">
                    <svg class="icon-sm"><use href="#i-lock"/></svg>
                    <input type="password" name="password" id="rp-pw"
                           placeholder="Минимум 6 символов" required>
                </div>
                <span class="field-error" id="rp-pw-err"></span>
            </label>
            <label>
                <span>Повторите пароль</span>
                <div class="input-with-icon">
                    <svg class="icon-sm"><use href="#i-lock"/></svg>
                    <input type="password" name="password2" id="rp-pw2"
                           placeholder="••••••" required>
                </div>
                <span class="field-error" id="rp-pw2-err"></span>
            </label>
            <button type="submit" class="btn btn-primary">
                Сохранить пароль
                <svg class="icon-sm"><use href="#i-arrow"/></svg>
            </button>
        </form>
    </div>
</div>
<script>
document.getElementById('reset-form').addEventListener('submit', function(e) {
    let ok = true;
    const pw = document.getElementById('rp-pw');
    const pw2 = document.getElementById('rp-pw2');
    const e1 = document.getElementById('rp-pw-err');
    const e2 = document.getElementById('rp-pw2-err');
    if (pw.value.length < 6) {
        e1.textContent = 'Минимум 6 символов'; pw.classList.add('input-invalid'); ok = false;
    } else { e1.textContent = ''; pw.classList.remove('input-invalid'); }
    if (pw.value !== pw2.value) {
        e2.textContent = 'Пароли не совпадают'; pw2.classList.add('input-invalid'); ok = false;
    } else { e2.textContent = ''; pw2.classList.remove('input-invalid'); }
    if (!ok) e.preventDefault();
});
</script>
{% endblock %}
